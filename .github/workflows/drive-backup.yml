name: Backup to Google Drive
on: 
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  drive-backup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create ZIP Archive
        run: |
          TIMESTAMP=$(date +'%Y-%m-%d_%H-%M')
          ZIP_NAME="backup-${TIMESTAMP}.zip"
          zip -r $ZIP_NAME .
          echo "FILENAME=${ZIP_NAME}" >> $GITHUB_ENV

      - name: Upload to Google Drive via OAuth
        uses: AnshPrakash/google-drive-upload-action@v0.1.3-alpha
        with:
          client_id: ${{ secrets.GDRIVE_CLIENT_ID }}
          client_secret: ${{ secrets.GDRIVE_CLIENT_SECRET }}
          refresh_token: ${{ secrets.GDRIVE_REFRESH_TOKEN }}
          file-to-upload: ${{ env.FILENAME }}
          upload-folder: 'GitHub Backups'
